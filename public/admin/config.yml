backend:
  name: git-gateway
  branch: main

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: spectacles
    label: Spectacles
    folder: content/spectacles
    create: true
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Infos (date, metteur en scène…), name: meta, widget: string, required: false }
      - { label: Ordre d'affichage, name: weight, widget: number, required: false }
      - label: Photos
        name: images
        widget: list
        required: false
        field: { label: Photo, name: image, widget: image }

  - name: presse
    label: Presse
    folder: content/presse
    create: true
    fields:
      - { label: Citation, name: title, widget: string }
      - { label: Source, name: source, widget: string, required: false }
      - { label: Texte complet, name: body, widget: markdown, required: false }

  - name: pages
    label: Pages
    files:
      - label: Accueil
        name: home
        file: content/_index.md
        fields:
          - { label: Photo hero, name: hero_image, widget: image }
          - { label: Accroche, name: description, widget: string }
      - label: À propos
        name: apropos
        file: content/apropos.md
        fields:
          - { label: Portrait, name: portrait, widget: image }
          - { label: Texte, name: body, widget: markdown }
      - label: Créations
        name: creations
        file: content/creations.md
        fields:
          - label: Photos
            name: images
            widget: list
            required: false
            field: { label: Photo, name: image, widget: image }
      - label: Contact
        name: contact
        file: content/contact.md
        fields:
          - { label: Email, name: email, widget: string }
